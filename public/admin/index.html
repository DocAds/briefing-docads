<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Login — Briefing DocAds</title>
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
  <div class="login-shell">
    <form class="login-card" id="login-form">
      <img src="/assets/img/logo.png" class="login-logo" alt="DocAds">
      <h2 style="margin-bottom: 8px;">Painel administrativo</h2>
      <p class="text-muted text-sm" style="margin-bottom: 32px;">Acesso restrito à equipe DocAds.</p>

      <div class="stack">
        <div class="field">
          <label class="field-label" for="email">E-mail</label>
          <input class="input" type="email" id="email" required autocomplete="username" value="adm@docads.com.br">
        </div>

        <div class="field">
          <label class="field-label" for="password">Senha</label>
          <div class="input-wrap" style="position:relative;">
            <input class="input" type="password" id="password" required autocomplete="current-password" style="padding-right:44px;">
            <button type="button" id="toggle-password" aria-label="Mostrar senha"
              style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;padding:8px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all 0.15s;">
              <svg id="icon-eye" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="icon-eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" x2="22" y1="2" y2="22"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="error-msg" style="display:none;color:var(--danger);font-size:13px;padding:8px 12px;background:rgba(239,68,68,0.08);border-radius:8px;"></div>

        <button class="btn btn-gradient btn-block btn-lg" type="submit" id="submit-btn">Entrar →</button>
      </div>
    </form>
  </div>

  <script>
    // Toggle visibilidade da senha
    document.getElementById('toggle-password').addEventListener('click', () => {
      const input = document.getElementById('password');
      const eye = document.getElementById('icon-eye');
      const eyeOff = document.getElementById('icon-eye-off');
      const btn = document.getElementById('toggle-password');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      eye.style.display = isHidden ? 'none' : 'block';
      eyeOff.style.display = isHidden ? 'block' : 'none';
      btn.setAttribute('aria-label', isHidden ? 'Ocultar senha' : 'Mostrar senha');
    });
  </script>

  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { supabase } from '/assets/js/supabase.js';

    // Se já está logado, redireciona
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      const { data: profile } = await supabase
        .from('admins')
        .select('id, is_active')
        .eq('id', session.user.id)
        .single();
      if (profile && profile.is_active) {
        window.location.href = '/admin/dashboard.html';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('submit-btn');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const { data: profile, error: pErr } = await supabase
          .from('admins')
          .select('id, is_active')
          .eq('id', data.user.id)
          .single();

        if (pErr || !profile || !profile.is_active) {
          await supabase.auth.signOut();
          throw new Error('Usuário sem permissão de admin.');
        }

        window.location.href = '/admin/dashboard.html';
      } catch (e) {
        errEl.textContent = e.message?.includes('Invalid')
          ? 'E-mail ou senha incorretos.'
          : (e.message || 'Erro ao entrar.');
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar →';
      }
    });
  </script>
</body>
</html>
