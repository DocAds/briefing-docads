<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Login — Briefing DocAds</title>
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
  <div class="login-shell">
    <form class="login-card" id="login-form">
      <img src="/assets/img/logo.png" class="login-logo" alt="DocAds">
      <h2 style="margin-bottom: 8px;">Painel administrativo</h2>
      <p class="text-muted text-sm" style="margin-bottom: 32px;">Acesso restrito à equipe DocAds.</p>

      <div class="stack">
        <div class="field">
          <label class="field-label" for="email">E-mail</label>
          <input class="input" type="email" id="email" required autocomplete="username" value="adm@docads.com.br">
        </div>

        <div class="field">
          <label class="field-label" for="password">Senha</label>
          <input class="input" type="password" id="password" required autocomplete="current-password">
        </div>

        <div id="error-msg" style="display:none;color:var(--danger);font-size:13px;padding:8px 12px;background:rgba(239,68,68,0.08);border-radius:8px;"></div>

        <button class="btn btn-gradient btn-block btn-lg" type="submit" id="submit-btn">Entrar →</button>
      </div>
    </form>
  </div>

  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { supabase } from '/assets/js/supabase.js';

    // Se já está logado, redireciona
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      const { data: profile } = await supabase
        .from('admins')
        .select('id, is_active')
        .eq('id', session.user.id)
        .single();
      if (profile && profile.is_active) {
        window.location.href = '/admin/dashboard.html';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('submit-btn');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const { data: profile, error: pErr } = await supabase
          .from('admins')
          .select('id, is_active')
          .eq('id', data.user.id)
          .single();

        if (pErr || !profile || !profile.is_active) {
          await supabase.auth.signOut();
          throw new Error('Usuário sem permissão de admin.');
        }

        window.location.href = '/admin/dashboard.html';
      } catch (e) {
        errEl.textContent = e.message?.includes('Invalid')
          ? 'E-mail ou senha incorretos.'
          : (e.message || 'Erro ao entrar.');
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar →';
      }
    });
  </script>
</body>
</html>
