<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Cliente — Briefing DocAds</title>
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/assets/css/app.css">
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
  <style>
    .briefing-slot {
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 18px; background: var(--surface);
      display: flex; flex-direction: column; gap: 10px;
    }
    .briefing-slot.has-link { border-color: var(--docads-cyan-2, #4FC3DC); }
    .slot-header {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .slot-title { font-weight: 700; font-size: 15px; color: var(--docads-navy, #0B1956); }
    .slot-link-box {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; word-break: break-all;
    }
    .slot-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .slot-actions .btn { flex: 1; min-width: 110px; }
    .slot-status-line { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="admin-shell">
    <main class="admin-main">
      <div class="container">
        <a href="/admin/clientes.html" class="text-sm text-muted" style="display:inline-block;margin-bottom:16px;">← Voltar para clientes</a>
        <div id="client-detail">
          <div class="text-muted">Carregando...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal: editar cliente -->
  <div class="modal-backdrop hidden" id="modal-edit">
    <div class="modal">
      <div class="modal-header">
        <h3>Editar cliente</h3>
        <button class="modal-close" data-close>×</button>
      </div>
      <form id="form-edit" class="stack">
        <div class="field">
          <label class="field-label field-required">Razão social / Nome da empresa</label>
          <input class="input" name="company_name" required>
        </div>
        <div class="row">
          <div class="field">
            <label class="field-label">Pessoa de contato</label>
            <input class="input" name="contact_name">
          </div>
          <div class="field">
            <label class="field-label">CNPJ</label>
            <input class="input" name="cnpj" data-mask="cnpj" inputmode="numeric" placeholder="00.000.000/0000-00">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label class="field-label">E-mail</label>
            <input class="input" type="email" name="contact_email">
          </div>
          <div class="field">
            <label class="field-label">Telefone</label>
            <input class="input" type="tel" name="contact_phone" data-mask="phone" inputmode="numeric" placeholder="(00) 00000-0000">
          </div>
        </div>
        <div class="field">
          <label class="field-label">Segmento</label>
          <input class="input" name="segment" placeholder="Ex: imobiliária, autopeças, clínica...">
        </div>
        <div class="field">
          <label class="field-label">Notas internas</label>
          <textarea class="textarea" name="internal_notes" rows="3"></textarea>
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px;">
          <button type="button" class="btn btn-ghost" data-close>Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar alterações</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { mountAdminShell } from '/assets/js/admin-shell.js';
    import { supabase, createBriefingLink } from '/assets/js/supabase.js';
    import { TYPE_META } from '/assets/js/briefing-registry.js';
    import { $, escapeHtml, formatDate, statusBadge, toast, copyToClipboard, getQueryParam } from '/assets/js/utils.js';
    import { applyMask } from '/assets/js/masks.js';

    await mountAdminShell('clientes');

    // Aplica máscaras em inputs com data-mask
    document.querySelectorAll('input[data-mask]').forEach(el => {
      el.addEventListener('input', () => applyMask(el, el.dataset.mask));
    });

    // Modal close handlers
    document.querySelectorAll('[data-close]').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.add('hidden'));
      });
    });
    document.querySelectorAll('.modal-backdrop').forEach(m => {
      m.addEventListener('click', e => { if (e.target === m) m.classList.add('hidden'); });
    });

    const cfg = window.DOCADS_CONFIG;
    const PUBLIC_URL = cfg.PUBLIC_URL || window.location.origin;
    const id = getQueryParam('id');
    if (!id) { window.location.href = '/admin/clientes.html'; }

    const TYPES = ['trafego', 'site'];

    async function load() {
      const { data: client, error } = await supabase
        .from('clients')
        .select(`
          *,
          briefing_links(id, slug, is_active, briefing_type, expires_at, access_count, last_accessed_at, created_at),
          briefings(id, status, briefing_type, progress, current_step, submitted_at, created_at, updated_at)
        `)
        .eq('id', id)
        .single();

      if (error || !client) { toast('Cliente não encontrado', 'error'); return; }

      const { data: activity } = await supabase
        .from('activity_log')
        .select('action, meta, created_at')
        .eq('client_id', id)
        .order('created_at', { ascending: false })
        .limit(20);

      render(client, activity || []);
    }

    function render(c, activity) {
      const briefings = (c.briefings || []).sort((a, b) =>
        new Date(b.created_at) - new Date(a.created_at)
      );

      $('#client-detail').innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">${escapeHtml(c.company_name)}</h1>
            <p class="page-subtitle">${escapeHtml(c.segment || 'Sem segmento informado')} · ${statusBadge(c.status)}</p>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-outline" id="btn-edit">Editar</button>
            <button class="btn btn-ghost" id="btn-archive" style="color:var(--text-muted);">${c.status === 'archived' ? 'Desarquivar' : 'Arquivar'}</button>
            <button class="btn btn-ghost" id="btn-delete" style="color:var(--danger);">Excluir</button>
          </div>
        </div>

        <div class="row client-grid" style="align-items:flex-start;">
          <div class="client-main" style="flex:2;min-width:0;">
            <div class="card">
              <div class="card-header"><h3 class="card-title">Dados do cliente</h3></div>
              <table style="width:100%;">
                ${row('Razão social', c.company_name)}
                ${row('Contato', c.contact_name)}
                ${row('E-mail', c.contact_email ? `<a href="mailto:${escapeHtml(c.contact_email)}">${escapeHtml(c.contact_email)}</a>` : '—', true)}
                ${row('Telefone', c.contact_phone)}
                ${row('CNPJ', c.cnpj)}
                ${row('Segmento', c.segment)}
                ${row('Status', statusBadge(c.status), true)}
                ${row('Cadastrado', formatDate(c.created_at))}
              </table>
              ${c.internal_notes ? `<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);"><div class="text-sm text-muted" style="margin-bottom:6px;">Notas internas</div><div>${escapeHtml(c.internal_notes)}</div></div>` : ''}
            </div>

            <div class="card" style="margin-top:24px;">
              <div class="card-header"><h3 class="card-title">Briefings recebidos</h3></div>
              ${briefings.length === 0
                ? '<div class="text-muted">Nenhum briefing iniciado ainda.</div>'
                : `<table class="table" style="border:none;box-shadow:none;">
                    <thead><tr><th>Tipo</th><th>Status</th><th>Progresso</th><th>Submetido</th><th></th></tr></thead>
                    <tbody>
                      ${briefings.map(b => {
                        const m = TYPE_META[b.briefing_type] || TYPE_META.trafego;
                        return `
                          <tr onclick="location.href='/admin/briefing.html?id=${b.id}'">
                            <td><span style="font-weight:600;">${m.emoji} ${m.label}</span></td>
                            <td>${statusBadge(b.status)}</td>
                            <td>
                              <div style="display:flex;align-items:center;gap:8px;max-width:200px;">
                                <div style="flex:1;height:6px;background:var(--surface-2);border-radius:100px;overflow:hidden;">
                                  <div style="width:${b.progress}%;height:100%;background:var(--docads-gradient);"></div>
                                </div>
                                <span class="text-sm text-muted">${b.progress}%</span>
                              </div>
                            </td>
                            <td class="text-sm text-muted">${b.submitted_at ? formatDate(b.submitted_at) : '—'}</td>
                            <td><a href="/admin/briefing.html?id=${b.id}" class="btn btn-ghost btn-sm">Ver →</a></td>
                          </tr>
                        `;
                      }).join('')}
                    </tbody>
                  </table>`
              }
            </div>

            <div class="card" style="margin-top:24px;">
              <div class="card-header"><h3 class="card-title">Atividade</h3></div>
              ${activity.length === 0
                ? '<div class="text-muted text-sm">Nenhuma atividade.</div>'
                : `<ul style="list-style:none;padding:0;margin:0;">
                    ${activity.map(a => `
                      <li style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;">
                        <span class="text-sm">${escapeHtml(actionLabel(a))}</span>
                        <span class="text-sm text-muted">${formatDate(a.created_at)}</span>
                      </li>
                    `).join('')}
                  </ul>`
              }
            </div>
          </div>

          <div class="client-side" style="flex:1;min-width:280px;display:flex;flex-direction:column;gap:16px;">
            ${TYPES.map(t => renderSlot(c, t, briefings)).join('')}
          </div>
        </div>
      `;

      attachListeners(c);
    }

    function renderSlot(c, t, briefings) {
      const meta = TYPE_META[t];
      const link = (c.briefing_links || []).find(l => l.briefing_type === t && l.is_active);
      const submittedBriefing = briefings.find(b => b.briefing_type === t && (b.status === 'submitted' || b.status === 'analyzed'));

      let body = '';
      if (submittedBriefing) {
        body = `
          <div class="slot-status-line" style="color: var(--success, #1F9D55);">
            ✓ Briefing já entregue · ${submittedBriefing.progress}% · ${formatDate(submittedBriefing.submitted_at)}
          </div>
          <div class="slot-actions">
            <a class="btn btn-primary btn-sm" href="/admin/briefing.html?id=${submittedBriefing.id}">Ver respostas →</a>
            <button class="btn btn-ghost btn-sm" data-regen-type="${t}">Gerar novo</button>
          </div>
        `;
      } else if (link) {
        const url = `${PUBLIC_URL}/b/${link.slug}`;
        body = `
          <div class="slot-link-box">${escapeHtml(url)}</div>
          <div class="slot-actions">
            <button class="btn btn-primary btn-sm" data-copy="${escapeHtml(url)}">📋 Copiar</button>
            <a class="btn btn-outline btn-sm" href="${escapeHtml(url)}" target="_blank">↗ Abrir</a>
            <button class="btn btn-ghost btn-sm" data-deactivate-id="${link.id}" style="color:var(--danger);">Desativar</button>
          </div>
          <div class="slot-status-line">
            ${link.access_count > 0
              ? `Acessado ${link.access_count}× · último em ${formatDate(link.last_accessed_at)}`
              : 'Ainda não foi acessado'}
          </div>
        `;
      } else {
        body = `
          <div class="slot-status-line">Nenhum link ativo.</div>
          <div class="slot-actions">
            <button class="btn btn-gradient btn-sm" data-gen-type="${t}">+ Gerar link de ${meta.label}</button>
          </div>
        `;
      }

      return `
        <div class="briefing-slot ${link ? 'has-link' : ''}">
          <div class="slot-header">
            <div class="slot-title">${meta.emoji} Briefing de ${meta.label}</div>
          </div>
          ${body}
        </div>
      `;
    }

    function row(label, value, html = false) {
      return `<tr><td style="padding:8px 0;color:var(--text-muted);font-size:13px;width:140px;vertical-align:top;">${label}</td><td style="padding:8px 0;font-size:14px;">${html ? value : escapeHtml(value || '—')}</td></tr>`;
    }

    function attachListeners(c) {
      document.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', () => copyToClipboard(btn.dataset.copy));
      });

      document.querySelectorAll('[data-gen-type]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const t = btn.dataset.genType;
          try {
            await createBriefingLink(c.id, t, c.company_name);
            toast(`Link de ${TYPE_META[t].label} gerado!`, 'success');
            await load();
          } catch (e) {
            console.error(e);
            toast('Erro ao gerar link: ' + (e.message || ''), 'error');
          }
        });
      });

      document.querySelectorAll('[data-regen-type]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const t = btn.dataset.regenType;
          if (!confirm(`Gerar um novo link de ${TYPE_META[t].label}? O cliente vai poder responder novamente — o briefing anterior continua salvo.`)) return;
          try {
            await createBriefingLink(c.id, t, c.company_name);
            toast(`Novo link de ${TYPE_META[t].label} gerado!`, 'success');
            await load();
          } catch (e) {
            console.error(e);
            toast('Erro ao gerar link: ' + (e.message || ''), 'error');
          }
        });
      });

      document.querySelectorAll('[data-deactivate-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Desativar o link? O cliente não poderá mais acessá-lo.')) return;
          await supabase.from('briefing_links').update({ is_active: false }).eq('id', btn.dataset.deactivateId);
          toast('Link desativado', 'success');
          await load();
        });
      });

      $('#btn-edit')?.addEventListener('click', () => {
        const form = $('#form-edit');
        form.elements.company_name.value = c.company_name || '';
        form.elements.contact_name.value = c.contact_name || '';
        form.elements.contact_email.value = c.contact_email || '';
        form.elements.contact_phone.value = c.contact_phone || '';
        form.elements.cnpj.value = c.cnpj || '';
        form.elements.segment.value = c.segment || '';
        form.elements.internal_notes.value = c.internal_notes || '';
        // Re-aplica máscaras nos valores carregados
        form.querySelectorAll('input[data-mask]').forEach(el => {
          if (el.value) applyMask(el, el.dataset.mask);
        });
        $('#modal-edit').classList.remove('hidden');
      });

      $('#form-edit').onsubmit = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const payload = {
          company_name: fd.get('company_name')?.toString().trim() || null,
          contact_name: fd.get('contact_name')?.toString().trim() || null,
          contact_email: fd.get('contact_email')?.toString().trim() || null,
          contact_phone: fd.get('contact_phone')?.toString().trim() || null,
          cnpj: fd.get('cnpj')?.toString().trim() || null,
          segment: fd.get('segment')?.toString().trim() || null,
          internal_notes: fd.get('internal_notes')?.toString().trim() || null
        };
        if (!payload.company_name) {
          toast('Razão social é obrigatória', 'warning');
          return;
        }
        try {
          const { error } = await supabase.from('clients').update(payload).eq('id', c.id);
          if (error) throw error;
          $('#modal-edit').classList.add('hidden');
          toast('Cliente atualizado', 'success');
          await load();
        } catch (err) {
          console.error(err);
          toast('Erro ao salvar: ' + (err.message || ''), 'error');
        }
      };

      $('#btn-archive')?.addEventListener('click', async () => {
        const isArchived = c.status === 'archived';
        const newStatus = isArchived ? 'pending' : 'archived';
        const action = isArchived ? 'desarquivar' : 'arquivar';
        if (!confirm(`Tem certeza que quer ${action} "${c.company_name}"?`)) return;
        const { error } = await supabase.from('clients')
          .update({ status: newStatus })
          .eq('id', c.id);
        if (error) { toast('Erro: ' + error.message, 'error'); return; }
        toast(`Cliente ${isArchived ? 'desarquivado' : 'arquivado'}`, 'success');
        await load();
      });

      $('#btn-delete')?.addEventListener('click', async () => {
        const confirmName = prompt(
          `⚠️ Excluir "${c.company_name}" permanentemente?\n\n` +
          `Isso vai remover o cliente, todos os links, briefings e logs.\n\n` +
          `Digite o nome da empresa exatamente como aparece pra confirmar:`
        );
        if (confirmName !== c.company_name) {
          if (confirmName != null) toast('Nome não confere — exclusão cancelada', 'warning');
          return;
        }
        const { error } = await supabase.from('clients').delete().eq('id', c.id);
        if (error) { toast('Erro ao excluir: ' + error.message, 'error'); return; }
        toast('Cliente excluído', 'success');
        setTimeout(() => { window.location.href = '/admin/clientes.html'; }, 800);
      });
    }

    function actionLabel(a) {
      const labels = {
        briefing_submitted: '✓ Briefing concluído pelo cliente',
        client_created: '+ Cliente cadastrado',
        link_generated: '🔗 Link de briefing gerado',
        briefing_analyzed: '📊 Briefing marcado como analisado',
        briefing_deleted: '🗑️ Briefing excluído'
      };
      const base = labels[a.action] || a.action;
      const t = a.meta?.briefing_type;
      if (t && TYPE_META[t]) return `${base} (${TYPE_META[t].label})`;
      return base;
    }

    await load();
  </script>
</body>
</html>
